<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f5ef" />
  <meta name="color-scheme" content="light" />
  <title>Korean Reader</title>
  <style>:root {
  --bg: #f4f5ef;
  --surface: rgba(255, 255, 255, 0.76);
  --surface-solid: #fffefa;
  --surface-muted: #edf3ee;
  --ink: #20342f;
  --muted: #71807b;
  --line: rgba(32, 52, 47, 0.12);
  --accent: #4d7f69;
  --accent-strong: #315f4e;
  --accent-soft: #dceadf;
  --word: #a65f3e;
  --ambient-one: #cfe3d3;
  --ambient-two: #eadcc6;
  --shadow-sm: 0 10px 34px rgba(38, 60, 53, 0.08);
  --shadow-md: 0 22px 70px rgba(38, 60, 53, 0.14);
  --radius-md: 22px;
  --radius-lg: 34px;
  --reader-size: 1.36rem;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-ui: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
    "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  --font-reading: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic",
    "NanumGothic", ui-sans-serif, sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 12% 7%, color-mix(in srgb, var(--ambient-one) 72%, transparent), transparent 30rem),
    radial-gradient(circle at 96% 10%, color-mix(in srgb, var(--ambient-two) 68%, transparent), transparent 28rem),
    var(--bg);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 220ms ease, color 220ms ease;
}

button,
input {
  font: inherit;
}

button {
  color: inherit;
}

button,
.story-card,
.sentence,
.word-token {
  -webkit-tap-highlight-color: transparent;
}

.ambient {
  position: fixed;
  z-index: -1;
  border-radius: 999px;
  filter: blur(100px);
  opacity: 0.42;
  pointer-events: none;
  transition: background 240ms ease;
}

.ambient-a {
  top: -10rem;
  left: -12rem;
  width: 30rem;
  height: 30rem;
  background: var(--ambient-one);
}

.ambient-b {
  right: -13rem;
  bottom: -9rem;
  width: 34rem;
  height: 34rem;
  background: var(--ambient-two);
}

.app-shell {
  width: min(1440px, calc(100% - 34px));
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
}

.view {
  display: none;
  min-height: 100vh;
  min-height: 100dvh;
}

.view-active {
  display: block;
}

.library-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  padding: 72px 8px 30px;
}

.eyebrow {
  margin: 0 0 7px;
  color: var(--accent);
  font-size: 0.74rem;
  font-weight: 850;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(2.3rem, 6vw, 4.7rem);
  line-height: 0.96;
  letter-spacing: -0.058em;
}

.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 49px;
  padding: 0 19px;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 780;
  transition: transform 160ms ease, box-shadow 160ms ease;
}

.button:hover {
  transform: translateY(-2px);
}

.button-primary {
  color: white;
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  box-shadow: 0 12px 28px color-mix(in srgb, var(--accent) 28%, transparent);
}

.library-toolbar {
  margin-bottom: 25px;
}

.search-box {
  display: flex;
  align-items: center;
  width: min(430px, 100%);
  height: 51px;
  padding: 0 17px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.7);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.search-box svg {
  width: 20px;
  height: 20px;
  margin-right: 10px;
  fill: none;
  stroke: var(--muted);
  stroke-width: 1.8;
  stroke-linecap: round;
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  color: var(--ink);
  background: transparent;
}

.search-box input::placeholder {
  color: color-mix(in srgb, var(--muted) 76%, transparent);
}

.story-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 19px;
  padding-bottom: 72px;
}

.story-card {
  position: relative;
  grid-column: span 6;
  min-height: 280px;
  overflow: hidden;
  padding: 27px;
  border: 1px solid color-mix(in srgb, var(--card-accent) 12%, white);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(145deg,
      color-mix(in srgb, var(--card-bg) 82%, white),
      color-mix(in srgb, var(--card-soft) 54%, white));
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 180ms ease, box-shadow 180ms ease;
}

.story-card::after {
  content: "";
  position: absolute;
  right: -52px;
  bottom: -58px;
  width: 205px;
  height: 205px;
  border-radius: 50%;
  background: var(--card-soft);
  opacity: 0.9;
}

.story-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}

.story-card:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--card-accent) 35%, transparent);
  outline-offset: 4px;
}

.story-card-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.story-level {
  display: inline-flex;
  align-self: flex-start;
  padding: 7px 11px;
  border-radius: 999px;
  color: var(--card-accent-strong);
  background: color-mix(in srgb, var(--card-soft) 70%, white);
  font-size: 0.72rem;
  font-weight: 850;
  letter-spacing: 0.04em;
}

.story-card h2 {
  margin: 24px 0 7px;
  max-width: 82%;
  font-family: var(--font-reading);
  font-size: clamp(1.8rem, 4vw, 2.65rem);
  line-height: 1.1;
  letter-spacing: -0.046em;
}

.english-title {
  margin-bottom: 14px;
  color: var(--muted);
  font-size: 0.96rem;
  font-weight: 680;
}

.description {
  max-width: 76%;
  margin: auto 0 0;
  color: var(--muted);
  line-height: 1.62;
}

.card-arrow {
  position: absolute;
  right: 25px;
  top: 25px;
  z-index: 2;
  display: grid;
  width: 43px;
  height: 43px;
  place-items: center;
  border-radius: 50%;
  color: var(--card-accent);
  background: rgba(255, 255, 255, 0.74);
  box-shadow: 0 9px 22px rgba(48, 74, 68, 0.1);
}

.card-arrow svg,
.icon-button svg {
  width: 21px;
  height: 21px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.9;
  stroke-linecap: round;
  stroke-linejoin: round;
}


.empty-state {
  grid-column: 1 / -1;
  padding: 64px 22px;
  border: 1px dashed var(--line);
  border-radius: var(--radius-lg);
  color: var(--muted);
  text-align: center;
}

.reader-view {
  padding: 18px 0 80px;
}

.glass {
  border: 1px solid rgba(255, 255, 255, 0.8);
  background: color-mix(in srgb, var(--surface) 90%, transparent);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(24px) saturate(1.12);
  -webkit-backdrop-filter: blur(24px) saturate(1.12);
}

.reader-header {
  position: sticky;
  top: 15px;
  z-index: 30;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 15px;
  min-height: 78px;
  padding: 12px 14px;
  border-radius: 27px;
}

.icon-button {
  display: inline-grid;
  width: 46px;
  height: 46px;
  place-items: center;
  border: 0;
  border-radius: 50%;
  color: var(--ink);
  background: color-mix(in srgb, var(--surface-muted) 88%, white);
  cursor: pointer;
  transition: transform 160ms ease, background 160ms ease;
}

.icon-button:hover {
  transform: translateY(-1px);
  background: var(--accent-soft);
}

.reader-heading {
  min-width: 0;
}

.reader-heading .eyebrow {
  margin-bottom: 2px;
}

.reader-heading h2 {
  overflow: hidden;
  margin: 0;
  font-family: var(--font-reading);
  font-size: clamp(1.05rem, 3vw, 1.45rem);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.reader-tools {
  display: flex;
  gap: 6px;
}

.text-button {
  width: auto;
  min-width: 46px;
  padding: 0 11px;
  border-radius: 15px;
  font-size: 0.84rem;
  font-weight: 850;
}

.reader-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(340px, 0.9fr);
  align-items: start;
  gap: 24px;
  margin-top: 30px;
}

.story-content {
  min-height: calc(100vh - 170px);
  padding: clamp(34px, 5vw, 70px);
  border: 1px solid rgba(255, 255, 255, 0.84);
  border-radius: clamp(27px, 4vw, 42px);
  background: color-mix(in srgb, var(--surface-solid) 94%, transparent);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
}

.story-paragraph {
  margin: 0 0 2.15em;
  font-family: var(--font-reading);
  font-size: var(--reader-size);
  font-weight: 525;
  line-height: 2.02;
  letter-spacing: -0.021em;
  word-break: keep-all;
}

.story-paragraph:last-child {
  margin-bottom: 0;
}

.sentence {
  border-radius: 8px;
  cursor: pointer;
  transition: background 150ms ease, box-shadow 150ms ease;
}

.sentence:hover {
  background: color-mix(in srgb, var(--accent-soft) 65%, transparent);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-soft) 65%, transparent);
}

.sentence-selected {
  background: var(--accent-soft);
  box-shadow: 0 0 0 4px var(--accent-soft);
}

.word-token {
  border-radius: 4px;
  cursor: context-menu;
  touch-action: pan-y;
}

@media (hover: hover) {
  .word-token:hover {
    color: var(--word);
    text-decoration: underline;
    text-decoration-color: color-mix(in srgb, var(--word) 38%, transparent);
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.2em;
  }
}

.detail-panel {
  position: sticky;
  top: 110px;
  min-height: min(690px, calc(100vh - 130px));
  max-height: calc(100vh - 130px);
  overflow: auto;
  padding: 25px 24px 32px;
  border: 1px solid rgba(255, 255, 255, 0.82);
  border-radius: 32px;
  background: color-mix(in srgb, var(--surface-solid) 95%, transparent);
  box-shadow: var(--shadow-md);
  scrollbar-width: thin;
}

.detail-panel-empty {
  overflow: hidden;
  background:
    radial-gradient(circle at 75% 22%, var(--accent-soft), transparent 12rem),
    linear-gradient(145deg, var(--surface-solid), color-mix(in srgb, var(--surface-muted) 65%, white));
}

.detail-panel-empty::after {
  content: "문장";
  position: absolute;
  right: -10px;
  bottom: -38px;
  color: color-mix(in srgb, var(--accent) 10%, transparent);
  font-family: var(--font-reading);
  font-size: 9rem;
  font-weight: 900;
  letter-spacing: -0.08em;
  pointer-events: none;
}

.detail-panel-empty .detail-content,
.detail-panel-empty .close-detail {
  display: none;
}

.close-detail {
  position: sticky;
  z-index: 2;
  top: 0;
  float: right;
  width: 39px;
  height: 39px;
  margin: -7px -7px 0 10px;
}

.detail-content {
  padding-right: 8px;
}

.detail-label {
  margin: 19px 0 8px;
  color: var(--accent);
  font-size: 0.71rem;
  font-weight: 870;
  letter-spacing: 0.13em;
  text-transform: uppercase;
}

.detail-label:first-child {
  margin-top: 2px;
}

.detail-korean {
  margin: 0 0 18px;
  font-family: var(--font-reading);
  font-size: clamp(1.25rem, 2.2vw, 1.75rem);
  font-weight: 770;
  line-height: 1.5;
  letter-spacing: -0.03em;
}

.detail-translation {
  margin: 0;
  color: color-mix(in srgb, var(--ink) 86%, var(--muted));
  font-size: 1rem;
  line-height: 1.7;
}

.grammar-list,
.vocab-list {
  display: grid;
  gap: 10px;
}

.grammar-card,
.vocab-row {
  padding: 15px 16px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: color-mix(in srgb, var(--surface-muted) 70%, white);
}

.grammar-pattern,
.vocab-term {
  margin: 0 0 5px;
  color: var(--word);
  font-family: var(--font-reading);
  font-weight: 830;
}

.grammar-explanation,
.grammar-example,
.vocab-meaning,
.vocab-note {
  margin: 0;
  line-height: 1.56;
}

.grammar-example,
.vocab-note {
  margin-top: 5px;
  color: var(--muted);
  font-size: 0.89rem;
}

.word-popover {
  position: fixed;
  z-index: 120;
  width: min(310px, calc(100vw - 28px));
  padding: 15px 17px;
  border: 1px solid color-mix(in srgb, var(--accent) 20%, white);
  border-radius: 19px;
  background: color-mix(in srgb, var(--ink) 96%, black);
  box-shadow: 0 20px 52px rgba(23, 39, 35, 0.28);
  color: #fff;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px) scale(0.98);
  transition: opacity 130ms ease, transform 130ms ease;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.word-popover-visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.word-popover strong {
  display: block;
  margin-bottom: 4px;
  color: color-mix(in srgb, var(--accent-soft) 74%, white);
  font-family: var(--font-reading);
  font-size: 1.08rem;
}

.word-popover p {
  margin: 0;
  line-height: 1.48;
}

.word-base,
.word-note {
  margin-top: 6px !important;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.86rem;
}


.toast {
  position: fixed;
  left: 50%;
  bottom: calc(24px + var(--safe-bottom));
  z-index: 160;
  max-width: calc(100% - 32px);
  padding: 12px 16px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--ink) 96%, black);
  color: white;
  font-size: 0.9rem;
  font-weight: 730;
  box-shadow: 0 16px 44px rgba(25, 43, 39, 0.24);
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, 12px);
  transition: opacity 160ms ease, transform 160ms ease;
}

.toast-visible {
  opacity: 1;
  transform: translate(-50%, 0);
}

@media (max-width: 1040px) {
  .reader-layout {
    grid-template-columns: minmax(0, 1.45fr) minmax(315px, 0.85fr);
    gap: 18px;
  }

  .story-content {
    padding: 42px 34px;
  }
}

@media (max-width: 900px) {
  .app-shell {
    width: min(100% - 20px, 1440px);
  }

  .story-card {
    grid-column: 1 / -1;
    min-height: 245px;
  }

  .reader-layout {
    display: block;
    margin-top: 26px;
  }

  .story-content {
    min-height: calc(100vh - 140px);
    padding: 34px 24px 48px;
    border-radius: 29px;
  }

  .detail-panel {
    position: fixed;
    inset: 0;
    z-index: 100;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    max-height: none;
    padding:
      calc(22px + var(--safe-top))
      22px
      calc(34px + var(--safe-bottom));
    border: 0;
    border-radius: 0;
    background: var(--surface-solid);
    opacity: 0;
    pointer-events: none;
    transform: translateX(100%);
    transition: transform 230ms cubic-bezier(.2,.8,.2,1), opacity 170ms ease;
  }

  .detail-panel-open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }

  .detail-panel-empty {
    display: none;
  }

  .close-detail {
    position: sticky;
    top: 0;
    width: 45px;
    height: 45px;
    margin: 0 0 8px auto;
    float: none;
  }

  .detail-content {
    width: min(680px, 100%);
    margin: 0 auto;
    padding: 0 0 60px;
  }

  .detail-korean {
    font-size: clamp(1.45rem, 6vw, 2rem);
  }

  .word-popover {
    left: 50% !important;
    top: auto !important;
    bottom: calc(18px + var(--safe-bottom));
    width: min(440px, calc(100% - 24px));
    transform: translate(-50%, 12px) scale(0.98);
  }

  .word-popover-visible {
    transform: translate(-50%, 0) scale(1);
  }
}

@media (max-width: 600px) {
  .library-header {
    display: grid;
    align-items: start;
    gap: 22px;
    padding-top: 42px;
  }

  h1 {
    font-size: 2.65rem;
  }


  .story-card {
    padding: 23px;
  }

  .story-card h2 {
    max-width: 79%;
  }

  .description {
    max-width: 88%;
  }

  .reader-view {
    padding-top: 10px;
  }

  .reader-header {
    top: 10px;
    min-height: 68px;
    padding: 9px;
    border-radius: 22px;
  }

  .reader-heading .eyebrow {
    display: none;
  }

  .reader-heading h2 {
    font-size: 1rem;
  }

  .reader-tools {
    gap: 3px;
  }

  .icon-button {
    width: 42px;
    height: 42px;
  }

  .text-button {
    min-width: 39px;
    padding: 0 7px;
    border-radius: 13px;
    font-size: 0.76rem;
  }

  .story-paragraph {
    line-height: 1.94;
  }

}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
}


[hidden] { display: none !important; }

.library-header {
  align-items: center;
}

.library-heading-group {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}

.library-copy {
  min-width: 0;
}

.library-subtitle {
  max-width: 760px;
  margin: 12px 0 0;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.65;
}

.library-back {
  flex: 0 0 auto;
  margin-top: 4px;
}

.collection-card {
  min-height: 310px;
}

.collection-card h2 {
  max-width: 78%;
  margin-top: 18px;
}

.collection-monogram {
  display: grid;
  width: 62px;
  height: 62px;
  place-items: center;
  border-radius: 20px;
  color: var(--card-accent-strong);
  background: color-mix(in srgb, var(--card-soft) 72%, white);
  font-family: var(--font-reading);
  font-size: 1.55rem;
  font-weight: 900;
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--card-accent) 12%, transparent);
}

.collection-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-right: 54px;
}

.collection-count {
  display: inline-flex;
  align-items: center;
  min-height: 31px;
  padding: 0 11px;
  border-radius: 999px;
  color: var(--card-accent-strong);
  background: rgba(255, 255, 255, 0.64);
  font-size: 0.76rem;
  font-weight: 820;
}

.collection-korean-title {
  margin-bottom: 13px;
  color: var(--card-accent-strong);
  font-family: var(--font-reading);
  font-size: 0.93rem;
  font-weight: 730;
}

.collection-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 18px;
}

.collection-tag {
  padding: 6px 9px;
  border-radius: 999px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.62);
  font-size: 0.7rem;
  font-weight: 700;
}

.collection-card .description {
  max-width: 82%;
  margin-top: auto;
}

.library-context {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.library-context-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
}

@media (max-width: 780px) {
  .library-header {
    align-items: flex-start;
  }

  .library-heading-group {
    align-items: flex-start;
  }

  .library-subtitle {

function slugify(value) {
  return String(value || "collection").toLowerCase().normalize("NFKD")
    .replace(/[^\p{L}\p{N}]+/gu, "-").replace(/^-+|-+$/g, "").slice(0, 64) || "collection";

const GITHUB_LIBRARY = Object.freeze({

});

function dirname(path) {
  const normalized = String(path || "").replace(/\\/g, "/");
  const index = normalized.lastIndexOf("/");
  return index < 0 ? "" : normalized.slice(0, index);
}

function basename(path) {
  const normalized = String(path || "").replace(/\\/g, "/");
  const index = normalized.lastIndexOf("/");
  return index < 0 ? normalized : normalized.slice(index + 1);
}

function pathDepth(path) {
  return path ? String(path).split("/").length : 0;
}

function numericOrder(path, fallback = 999) {
  const match = basename(path).match(/^(\d+)/);
  return match ? Number(match[1]) : fallback;
}

function encodeGitHubPath(path) {
  return String(path).split("/").map(encodeURIComponent).join("/");
}

function humanizeFolderName(value) {
  return String(value || "Collection")
    .replace(/[-_]+/g, " ")
    .replace(/\b\w/g, (letter) => letter.toUpperCase());

async function fetchGitHubJSON(url, label) {
  const response = await fetch(url, {
    headers: {Accept: "application/vnd.github+json"},
    cache: "no-cache"
  });
  if (!response.ok) {
    throw new Error(`${label}: GitHub returned ${response.status}.`);
  }
  return response.json();
}

async function loadLibrary() {
  const {owner, repo, branch, root} = GITHUB_LIBRARY;
  const treeUrl =
    `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}` +
    `/git/trees/${encodeURIComponent(branch)}?recursive=1`;

  const treeData = await fetchGitHubJSON(treeUrl, "Could not read the repository");
  if (treeData.truncated) {
    throw new Error("The GitHub file list was truncated because the repository is too large.");
  }

  const rootPrefix = `${String(root).replace(/^\/+|\/+$/g, "")}/`;
  const jsonEntries = (treeData.tree || [])
    .filter((entry) =>
      entry.type === "blob" &&
      entry.path.startsWith(rootPrefix) &&
      entry.path.toLowerCase().endsWith(".json")
    )
    .sort((a, b) => a.path.localeCompare(b.path, undefined, {numeric: true}));

  if (!jsonEntries.length) {
    throw new Error(`No JSON stories were found inside ${root}/.`);
  }

  const results = await Promise.allSettled(jsonEntries.map(async (entry) => {
    const rawUrl =
      `https://raw.githubusercontent.com/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/` +
      `${encodeURIComponent(branch)}/${encodeGitHubPath(entry.path)}`;
    const response = await fetch(rawUrl, {cache: "no-cache"});
    if (!response.ok) throw new Error(`${entry.path}: HTTP ${response.status}`);
    return {
      path: entry.path,
      dir: dirname(entry.path),
      name: basename(entry.path),
      rawUrl,
      data: await response.json()
    };
  }));

  const parsed = [];
  const warnings = [];
  results.forEach((result, index) => {
    if (result.status === "fulfilled") parsed.push(result.value);
    else warnings.push(result.reason?.message || jsonEntries[index].path);
  });

  const collectionInfos = parsed
    .filter((item) => item.data?.type === "collection")
    .map((item) => ({
      ...item,
      collection: normalizeCollection(item.data, item.dir)
    }));

  state.collections = collectionInfos.map((item) => item.collection);
  state.stories = [];

  const collectionByDirectory = new Map(
    collectionInfos.map((item) => [item.dir, item.collection])
  );

  const topLevelDirectories = new Set();
  parsed.forEach((item) => {
    const relative = item.path.slice(rootPrefix.length);
    const firstDirectory = relative.includes("/") ? relative.split("/")[0] : "";
    if (firstDirectory) topLevelDirectories.add(`${rootPrefix}${firstDirectory}`);
  });

  topLevelDirectories.forEach((directory) => {
    const hasMetadata = collectionInfos.some(
      (item) => item.dir === directory || item.dir.startsWith(`${directory}/`)

    if (hasMetadata) return;

    const folder = basename(directory);

    if (!collectionId) {
      const matchingMetadata = collectionInfos
        .filter((info) => item.dir === info.dir || item.dir.startsWith(`${info.dir}/`))
        .sort((a, b) => pathDepth(b.dir) - pathDepth(a.dir));

    }

    if (!collectionId) {
      const relative = item.path.slice(rootPrefix.length);

      collectionId =
        collectionByDirectory.get(`${rootPrefix}${firstDirectory}`)?.id ||

    } catch (error) {
      warnings.push(`${item.path}: ${error.message}`);

  state.collections = state.collections
    .filter((collection, index, all) =>

    )
    .map((collection) => ({
      ...collection,
      storyCount: state.stories.filter(

    }));

  if (!state.stories.length) {

function normalizeCollection(info = {}, fallbackPath = "") {
  const id = String(info.id || slugify(info.title || fallbackPath));
  return {
    type: "collection", id,
    title: String(info.title || id), koreanTitle: String(info.koreanTitle || ""),
    description: String(info.description || ""), level: String(info.level || ""),
    theme: THEMES[info.theme] ? info.theme : "sage",
    order: Number.isFinite(Number(info.order)) ? Number(info.order) : 999,
    monogram: String(info.monogram || (info.title || id).slice(0, 1).toUpperCase()),
    tags: Array.isArray(info.tags) ? info.tags.map(String) : [],
    storyCount: Number(info.storyCount) || 0, sort: String(info.sort || "order")
  };
}

function normalizeStory(story, sourceName = "Imported story", fallbackCollectionId = "uncategorized", fallbackOrder = 999) {
  if (!story || typeof story !== "object" || !Array.isArray(story.paragraphs)) {
    throw new Error(`${sourceName} is not a Korean reader story.`);
  }
  story.paragraphs.forEach((paragraph, paragraphIndex) => {
    if (!paragraph || !Array.isArray(paragraph.sentences)) throw new Error(`Paragraph ${paragraphIndex + 1} needs a sentences array.`);
    paragraph.sentences.forEach((sentence, sentenceIndex) => {
      if (!sentence || typeof sentence.korean !== "string" || !sentence.korean.trim()) throw new Error(`Paragraph ${paragraphIndex + 1}, sentence ${sentenceIndex + 1} needs Korean text.`);
      sentence.translation = String(sentence.translation || "");
      sentence.grammar = Array.isArray(sentence.grammar) ? sentence.grammar : [];
      sentence.vocab = Array.isArray(sentence.vocab) ? sentence.vocab : [];
      sentence.words = Array.isArray(sentence.words) ? sentence.words : [];
    });
  });
  return {
    id: String(story.id || `${slugify(story.title || sourceName)}-${Date.now().toString(36)}`),
    title: String(story.title || sourceName.replace(/\.json$/i, "")),
    englishTitle: String(story.englishTitle || ""), level: String(story.level || ""),
    description: String(story.description || ""), theme: THEMES[story.theme] ? story.theme : "sage",
    collectionId: String(story.collectionId || fallbackCollectionId),
    order: Number.isFinite(Number(story.order)) ? Number(story.order) : fallbackOrder,
    sourcePath: String(story.sourcePath || ""), paragraphs: story.paragraphs

function ensureCollectionsForStories() {

        koreanTitle: "가져온 이야기", description: "Stories imported without a collection info.json file.",

function renderStory(story) {
  storyContent.replaceChildren();

  story.paragraphs.forEach((paragraph) => {
    const paragraphElement = document.createElement("p");
    paragraphElement.className = "story-paragraph";

    paragraph.sentences.forEach((sentence, sentenceIndex) => {
      const sentenceElement = document.createElement("span");
      sentenceElement.className = "sentence";
      sentenceElement.tabIndex = 0;

      appendWordTokens(sentenceElement, sentence);

      sentenceElement.addEventListener("click", (event) => {
        if (event.defaultPrevented || state.longPressTriggered) {
          state.longPressTriggered = false;
          return;
        }
        event.stopPropagation();
        selectSentence(sentenceElement, sentence);
      });

      sentenceElement.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          selectSentence(sentenceElement, sentence);
        }
      });

      paragraphElement.appendChild(sentenceElement);

      if (sentenceIndex < paragraph.sentences.length - 1) {

function appendWordTokens(container, sentence) {
  const lookup = buildWordLookup(sentence);
  const chunks = sentence.korean.split(/(\s+)/u);

  chunks.forEach((chunk) => {
    if (!chunk) return;

    if (/^\s+$/u.test(chunk)) {
      container.appendChild(document.createTextNode(chunk));
      return;
    }

    const clean = cleanToken(chunk);
    const translation = lookup.get(clean) || {
      surface: clean || chunk,
      meaning: "No individual translation is stored for this word yet.",
      note: "Add it to the sentence’s words list in the JSON story file."
    };

    const word = document.createElement("span");
    word.className = "word-token";
    word.textContent = chunk;
    word.dataset.surface = clean || chunk;

    word.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      event.stopPropagation();
      showWordPopover(translation, event.clientX, event.clientY);
    });

    let pressStarted = false;

    word.addEventListener("pointerdown", (event) => {
      if (event.pointerType !== "touch") return;
      pressStarted = true;
      state.longPressTriggered = false;
      clearTimeout(state.longPressTimer);
      state.longPressTimer = window.setTimeout(() => {
        if (!pressStarted) return;
        state.longPressTriggered = true;
        showWordPopover(translation, event.clientX, event.clientY);
        if (navigator.vibrate) navigator.vibrate(20);
        window.setTimeout(() => {
          state.longPressTriggered = false;
        }, 900);
      }, 560);
    });

    const cancelLongPress = () => {
      pressStarted = false;
      clearTimeout(state.longPressTimer);
    };

    word.addEventListener("pointerup", cancelLongPress);
    word.addEventListener("pointercancel", cancelLongPress);
    word.addEventListener("pointerleave", cancelLongPress);

    word.addEventListener("click", (event) => {
      if (state.longPressTriggered) {
        event.preventDefault();
        event.stopPropagation();
        window.setTimeout(() => {
          state.longPressTriggered = false;
        }, 0);
      }
    });

    container.appendChild(word);
  });
}

function cleanToken(token) {
  return token
    .replace(/^[^\p{L}\p{N}]+/gu, "")
    .replace(/[^\p{L}\p{N}]+$/gu, "");
}

function buildWordLookup(sentence) {
  const lookup = new Map();

  (sentence.words || []).forEach((entry) => {
    if (!entry || !entry.surface) return;
    lookup.set(cleanToken(String(entry.surface)), {
      surface: String(entry.surface),
      meaning: String(entry.meaning || "—"),
      base: String(entry.base || ""),
      note: String(entry.note || "")
    });
  });

  (sentence.vocab || []).forEach((entry) => {
    if (!entry || !entry.word) return;
    const key = cleanToken(String(entry.word));
    if (!lookup.has(key) && !String(entry.word).includes(" ")) {
      lookup.set(key, {
        surface: String(entry.word),
        meaning: String(entry.meaning || "—"),
        base: "",
        note: String(entry.note || "")
      });
    }
  });

  return lookup;
}

function positionWordPopover(clientX, clientY) {
  const rect = wordPopover.getBoundingClientRect();
  const margin = 14;

  let left = clientX + 12;
  let top = clientY + 12;

  if (left + rect.width > window.innerWidth - margin) {
    left = clientX - rect.width - 12;
  }
  if (top + rect.height > window.innerHeight - margin) {
    top = clientY - rect.height - 12;
  }

  wordPopover.style.left = `${Math.max(margin, left)}px`;
  wordPopover.style.top = `${Math.max(margin, top)}px`;
}

function escapeXmlV8(value) {
  return String(value || "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;"
  })[char]);
}

function splitCoverTextV8(value, maxCharacters = 12, maxLines = 2) {
  const raw = String(value || "").trim();
  if (!raw) return [];
  const words = raw.split(/\s+/u);
  const lines = [];
  let current = "";

  words.forEach((word) => {
    if (!current) {
      current = word;
    } else if ((current + " " + word).length <= maxCharacters) {
      current += " " + word;
    } else {
      lines.push(current);
      current = word;
    }
  });
  if (current) lines.push(current);

  if (lines.length === 1 && lines[0].length > maxCharacters && !/\s/u.test(lines[0])) {
    const compact = lines[0];
    lines.length = 0;
    for (let index = 0; index < compact.length; index += maxCharacters) {
      lines.push(compact.slice(index, index + maxCharacters));
    }
  }

  const limited = lines.slice(0, maxLines);
  if (lines.length > maxLines && limited.length) {
    limited[limited.length - 1] = limited[limited.length - 1].replace(/[.…]*$/u, "") + "…";
  }
  return limited;
}

function shortEnglishTitleV8(story) {
  const full = String(story?.englishTitle || "").trim();
  if (!full) return "KOREAN READER";
  const pieces = full.split(/\s+[—–-]\s+/u);
  return (pieces[pieces.length - 1] || full).trim();
}

function createStoryThumbnailV8(story, accent) {
  const wrapper = document.createElement("div");
  wrapper.className = "story-thumbnail";
  wrapper.setAttribute("aria-hidden", "true");

  const image = document.createElement("img");
  const fallback = generatedStoryThumbnailV8(story, accent);
  image.src = storyThumbnailSourceV8(story, accent);
  image.alt = "";
  image.decoding = "async";
  image.loading = "eager";
  image.addEventListener("error", () => {

  }, {once: true});

  wrapper.appendChild(image);
  return wrapper;
}
function groupIdFor(story) { return story?.variantGroupId || story?.id || ""; }
function getVariantGroupsForCollection(collectionId) {
  const groups = new Map();
  getStoriesForCollection(collectionId).forEach((story, index) => {
    const groupId = groupIdFor(story);
    if (!groups.has(groupId)) groups.set(groupId, {groupId, variants: [], index});
    groups.get(groupId).variants.push(story);
  });
  return [...groups.values()].map((group) => {
    group.variants = uniqueStoriesV7(group.variants)
      .sort((a, b) => a.difficultyOrder - b.difficultyOrder || a.order - b.order || a.title.localeCompare(b.title));

  });
}

    .filter((collection) => {
      const stories = getStoriesForCollection(collection.id);
      const haystack = [collection.title, collection.koreanTitle, collection.description, collection.level, ...collection.tags, ...stories.flatMap((s) => [s.title, s.englishTitle, s.level])].join(" ").toLowerCase();
      return haystack.includes(query);

openStory = function(story, push = false) {

appendWordTokens = function(container, sentence) {
  const lookup = buildWordLookup(sentence);
  const chunks = sentence.korean.split(/(\s+)/u);
  chunks.forEach((chunk) => {
    if (!chunk) return;
    if (/^\s+$/u.test(chunk)) { container.appendChild(document.createTextNode(chunk)); return; }
    const clean = cleanToken(chunk);
    const translation = lookup.get(clean) || {
      surface: clean || chunk,
      meaning: "No individual translation is stored for this word yet.",
      note: "Add it to the sentence’s words list in the JSON story file."
    };
    const word = document.createElement("span");
    word.className = "word-token"; word.textContent = chunk; word.dataset.surface = clean || chunk;

    word.addEventListener("dblclick", (event) => {
      event.preventDefault(); event.stopPropagation();
      state.suppressSentenceClickUntil = Date.now() + 450;
      showWordPopover(translation, event.clientX, event.clientY);
    });

    word.addEventListener("pointerup", (event) => {
      if (event.pointerType === "mouse") return;
      event.preventDefault(); event.stopPropagation();
      const now = Date.now();
      const sameWord = state.lastWordTap.element === word;
      if (sameWord && now - state.lastWordTap.time < 370) {
        clearTimeout(state.wordTapTimer);
        state.suppressSentenceClickUntil = now + 500;
        showWordPopover(translation, event.clientX, event.clientY);
        state.lastWordTap = {element: null, time: 0};
      } else {
        clearTimeout(state.wordTapTimer);
        state.lastWordTap = {element: word, time: now};
        state.wordTapTimer = window.setTimeout(() => {
          if (state.lastWordTap.element === word && state.lastWordTap.time === now) {
            state.lastWordTap = {element: null, time: 0};
            selectSentence(container, sentence);
          }
        }, 390);
      }
    }, {passive: false});

    word.addEventListener("click", (event) => {
      if (event.detail === 0 || Date.now() < state.suppressSentenceClickUntil || state.lastWordTap.element === word) {
        event.preventDefault(); event.stopPropagation();
      }
    });

    word.addEventListener("keydown", (event) => {
      if (event.key === "Enter") { event.preventDefault(); event.stopPropagation(); showWordPopover(translation, innerWidth / 2, innerHeight / 2); }
    });
    container.appendChild(word);
  });
};

function mixHexV6(a, b, amount) {
  const parse = (hex) => {
    const h = String(hex).replace("#", "");
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  };
  const x = parse(a), y = parse(b);
  return "#" + x.map((v,i) => Math.round(v * (1-amount) + y[i] * amount).toString(16).padStart(2,"0")).join("");
}

applyTheme = function(themeKey) {
  const accent = THEMES[themeKey] || THEMES.sage;
  const appearance = APPEARANCES[state.appearance] || APPEARANCES.light;
  const dark = state.appearance === "dark";
  const root = document.documentElement;
  root.style.setProperty("--bg", appearance.bg);
  root.style.setProperty("--surface", dark ? `${appearance.surface}e8` : `${appearance.surface}d9`);
  root.style.setProperty("--surface-solid", appearance.surface);
  root.style.setProperty("--surface-muted", appearance.surfaceMuted);
  root.style.setProperty("--ink", appearance.ink);
  root.style.setProperty("--muted", appearance.muted);
  root.style.setProperty("--accent", dark ? mixHexV6(accent.accent, "#ffffff", .25) : accent.accent);
  root.style.setProperty("--accent-strong", dark ? mixHexV6(accent.accent, "#ffffff", .43) : accent.accentStrong);
  root.style.setProperty("--accent-soft", dark ? mixHexV6(accent.accent, appearance.surfaceMuted, .72) : accent.accentSoft);
  root.style.setProperty("--word", dark ? mixHexV6(accent.word, "#ffffff", .28) : accent.word);
  root.style.setProperty("--ambient-one", dark ? mixHexV6(accent.accent, appearance.bg, .55) : accent.ambientOne);
  root.style.setProperty("--ambient-two", dark ? mixHexV6(accent.word, appearance.bg, .62) : accent.ambientTwo);
  if (dark) {

    root.style.setProperty("--word-popover-muted", "#58645f");
  } else {
    root.style.setProperty("--word-popover-bg", "#17211e");
    root.style.setProperty("--word-popover-text", "#ffffff");
    root.style.setProperty("--word-popover-heading", mixHexV6(accent.accentSoft, "#ffffff", .38));
    root.style.setProperty("--word-popover-muted", "rgba(255,255,255,.72)");
  }
  themeColorMeta.setAttribute("content", appearance.bg);
};

function positionFloatingMenu(menu, anchor) {
  requestAnimationFrame(() => {
    const anchorRect = anchor.getBoundingClientRect();
    const menuRect = menu.getBoundingClientRect();
    const margin = 12;
    let left = anchorRect.right - menuRect.width;
    let top = anchorRect.bottom + 9;
    if (left < margin) left = margin;
    if (left + menuRect.width > innerWidth - margin) left = innerWidth - menuRect.width - margin;
    if (top + menuRect.height > innerHeight - margin) top = anchorRect.top - menuRect.height - 9;
    menu.style.left = `${Math.max(margin, left)}px`;
    menu.style.top = `${Math.max(margin, top)}px`;
  });
}

  const currentId = state.activeStory && groupIdFor(state.activeStory) === groupId ? state.activeStory.id : (state.variantSelections[groupId] || variants[0].id);

    const copy = document.createElement("span");
    copy.append(createTextBlock("strong", "", variant.variantLabel || variant.level || "Version"));
    copy.append(createTextBlock("small", "", variant.englishTitle || variant.title));
    const check = createTextBlock("span", "variant-choice-check", variant.id === currentId ? "✓" : "");

/* =========================================================
   External thumbnails
   =========================================================

   External thumbnail examples inside a story JSON:

     "thumbnail": "thumbnails/avatar-the-promise.jpg"
       -> relative to this HTML file

     "thumbnail": "./cover.jpg"
       -> relative to the imported JSON file's folder when sourcePath is known

   The image remains an external file. It is only referenced through <img src="...">.
*/

function resolveThumbnailPathV9(story, value) {
  const path = String(value || "").trim().replace(/\\/g, "/");
  if (!path) return "";

  /* Full URLs, data/blob URLs, root paths, and anchors are already complete. */
  if (/^(?:[a-z][a-z0-9+.-]*:|\/|#)/i.test(path)) return path;

  /* ./cover.jpg and ../cover.jpg follow the imported JSON folder. */
  if (/^\.\.?\//.test(path) && story?.sourcePath) {
    try {
      const sourceUrl = new URL(String(story.sourcePath).replace(/\\/g, "/"), document.baseURI);
      return new URL(path, sourceUrl).href;
    } catch {}
  }

  /* Other relative paths are intentionally relative to the HTML file. */
  return path;
}

storyThumbnailSourceV8 = function(story, accent) {
  const groupThumbnail = story?.thumbnail || getVariants(groupIdFor(story)).find((variant) => variant.thumbnail)?.thumbnail || "";
  const resolved = resolveThumbnailPathV9(story, groupThumbnail);
  return resolved || generatedStoryThumbnailV8(story, accent);
};
