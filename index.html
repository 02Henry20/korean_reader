<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="#f4f5ef" name="theme-color"/>
<meta content="light dark" name="color-scheme"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Korean Reader" name="apple-mobile-web-app-title"/>
<link href="icons/favicon.ico" rel="icon" sizes="any"/>
<link href="icons/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="icons/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png"/>
<link href="icons/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="site.webmanifest" rel="manifest"/>
<title>Korean Reader</title>
<link href="css/base.css" rel="stylesheet"/>
<link href="css/layout.css" rel="stylesheet"/>
<link href="css/cards.css" rel="stylesheet"/>
<link href="css/reader.css" rel="stylesheet"/>
<link href="css/grammar.css" rel="stylesheet"/>
<link href="css/overlays.css" rel="stylesheet"/>
<link href="css/settings.css" rel="stylesheet"/>

<link href="css/mobile.css" rel="stylesheet"/>
<link href="css/animations.css" rel="stylesheet"/>
<link href="css/directories.css" rel="stylesheet"/>
<link href="css/themes.css" rel="stylesheet"/>
<link href="css/thumbnails.css" rel="stylesheet"/>
</head>
<body>
<div class="ambient ambient-a"></div>
<div class="ambient ambient-b"></div>
<main class="app-shell">
<section aria-label="Korean story library" class="view view-active" id="libraryView">
<header class="library-header">
<div class="library-heading-group">
<button aria-label="Back to collections" class="icon-button library-back" hidden="" id="libraryBackButton" type="button">
<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<div class="library-copy">
<p class="eyebrow" id="libraryEyebrow">한국어 리더</p>
<h1 id="libraryTitle">Korean Reader</h1>
<p class="library-subtitle" id="librarySubtitle">Choose a collection.</p>
</div>
</div>
<div class="library-actions" id="libraryActions">

<button aria-label="Open settings" class="button settings-button" id="settingsButton" type="button">
<svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21h-4v-.1a1.7 1.7 0 0 0-1.4-1.67 1.7 1.7 0 0 0-1.57.47l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3v-4h.1A1.7 1.7 0 0 0 4.77 8.2a1.7 1.7 0 0 0-.47-1.57l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3h4v.1A1.7 1.7 0 0 0 15.8 4.77a1.7 1.7 0 0 0 1.57-.47l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.12.38.33.72.6 1 .3.28.68.42 1.1.4h.1v4h-.1A1.7 1.7 0 0 0 19.4 15Z"></path></svg>
<span>Settings</span>
</button>
</div>
</header>
<section class="library-toolbar">
<label class="search-box">
<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35m2.1-5.4a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"></path></svg>
<input autocomplete="off" id="searchInput" placeholder="Search titles, descriptions, or story text" type="search"/>
</label>

</section>
<section aria-live="polite" class="story-grid" id="storyGrid"></section>
</section>
<section aria-label="Story reader" class="view reader-view" id="readerView">
<header class="reader-header glass">
<button aria-label="Back to story list" class="icon-button" id="backButton" type="button">
<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<div class="reader-heading">
<button aria-label="Choose story level" class="eyebrow reader-level-button" id="readerLevel" type="button"></button>
<h2 id="readerTitle"></h2>
</div>
</header>
<div class="reader-layout">
<article aria-live="polite" class="story-content" id="storyContent"></article>

<div aria-hidden="true" class="detail-backdrop" hidden id="detailBackdrop"></div>
<aside aria-hidden="true" aria-label="Grammar explanation" class="detail-panel detail-panel-empty" id="detailPanel">
<div aria-hidden="true" class="detail-drag-handle"></div>
<button aria-label="Close grammar explanation" class="icon-button close-detail" id="closeDetailButton" type="button">
<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"></path></svg>
</button>
<div class="detail-content" id="detailContent"></div>
</aside>
</div>
</section>

</main>
<div aria-hidden="true" class="word-popover" id="wordPopover" role="dialog"></div>
<div aria-hidden="true" class="variant-menu" id="variantMenu" role="menu"></div>
<div class="settings-backdrop" hidden="" id="settingsBackdrop"></div>
<aside aria-hidden="true" aria-label="Reader settings" class="settings-panel" id="settingsPanel">
<header class="settings-header">
<div>
<p class="eyebrow">CUSTOMIZATION</p>
<h2>Settings</h2>
</div>
<button aria-label="Close settings" class="icon-button" id="closeSettingsButton" type="button">
<svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"></path></svg>
</button>
</header>
<form class="settings-form" id="settingsForm">
<section class="settings-section">
<h3>Appearance</h3>
<label class="setting-row"><span><strong>Light or dark</strong><small>Controls the page surfaces.</small></span><select name="appearance"></select></label>
<label class="setting-row"><span><strong>Theme</strong><small>Controls global accents and ambient colors.</small></span><select name="theme"></select></label>
<label class="setting-toggle"><span><strong>Story accent colors</strong><small>Let story JSON colors override the global accent.</small></span><input name="storyAccents" type="checkbox"/></label>
</section>
<section class="settings-section">
<h3>Typography</h3>
<label class="setting-row"><span><strong>Interface font</strong></span><select name="uiFont"></select></label>
<label class="setting-row"><span><strong>Story font</strong><small>“Story preference” uses the font from story JSON.</small></span><select name="storyFont"></select></label>
<label class="setting-range"><span><strong>Story text size</strong><output id="readerSizeOutput"></output></span><input max="2.05" min="1" name="readerSize" step="0.05" type="range"/></label>
<label class="setting-range"><span><strong>Line spacing</strong><output id="lineSpacingOutput"></output></span><input max="2.4" min="1.5" name="lineSpacing" step="0.05" type="range"/></label>
</section>
<section class="settings-section">
<h3>Learning tools</h3>
<label class="setting-row"><span><strong>Translation popup</strong><small>Choose whether base forms and notes are shown.</small></span><select name="translationDetails"><option value="compact">Meaning only</option><option value="expanded">Meaning, base form, and notes</option></select></label>
<label class="setting-toggle"><span><strong>Key vocabulary</strong><small>Show vocabulary below grammar explanations.</small></span><input name="showKeyVocabulary" type="checkbox"/></label>
<label class="setting-row"><span><strong>Grammar detail level</strong></span><select name="grammarDetail"><option value="concise">Concise</option><option value="detailed">Detailed</option></select></label>
</section>
<section class="settings-section">
<h3>Motion</h3>
<label class="setting-row"><span><strong>Animation intensity</strong></span><select name="animationIntensity"><option value="full">Full</option><option value="reduced">Reduced</option><option value="none">None</option></select></label>
</section>
<button class="button settings-reset" id="resetSettingsButton" type="button">Reset settings</button>
</form>
</aside>
<div aria-live="polite" class="toast" id="toast" role="status"></div>
<script src="js/storage.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
<script src="js/library.js"></script>
<script src="js/router.js"></script>
<script src="js/directories.js"></script>
<script src="js/stories.js"></script>
<script src="js/thumbnails.js"></script>
<script src="js/grammar.js"></script>
<script src="js/reader.js"></script>
<script src="js/interactions.js"></script>
<script src="js/themes.js"></script>
<script src="js/settings-panel.js"></script>

<script src="js/bookmarks.js"></script>
<script src="js/search.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
